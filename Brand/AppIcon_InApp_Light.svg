<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>

    <!-- Mic capsule body gradient — metallic silver with blue tint -->
    <linearGradient id="capsule-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8D0DC"/>
      <stop offset="15%" stop-color="#E8EDF4"/>
      <stop offset="40%" stop-color="#F8FAFF"/>
      <stop offset="60%" stop-color="#F8FAFF"/>
      <stop offset="85%" stop-color="#E0E6F0"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </linearGradient>

    <!-- Capsule highlight — bright white streak on left -->
    <linearGradient id="capsule-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="10%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="25%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Mesh grill gradient — darker in center for depth -->
    <linearGradient id="grill-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0AAB8"/>
      <stop offset="20%" stop-color="#BCC4D0"/>
      <stop offset="50%" stop-color="#D0D8E4"/>
      <stop offset="80%" stop-color="#BCC4D0"/>
      <stop offset="100%" stop-color="#98A2B0"/>
    </linearGradient>

    <!-- Cradle/stem metallic gradient -->
    <linearGradient id="cradle-metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B0BAC8"/>
      <stop offset="30%" stop-color="#D8DFE8"/>
      <stop offset="50%" stop-color="#EEF2F8"/>
      <stop offset="70%" stop-color="#D8DFE8"/>
      <stop offset="100%" stop-color="#A8B2C0"/>
    </linearGradient>

    <!-- Base gradient -->
    <linearGradient id="base-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0D8E4"/>
      <stop offset="50%" stop-color="#E8EDF4"/>
      <stop offset="100%" stop-color="#BCC4D0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,40,120,0.25)"/>
    </filter>

    <!-- Grill mesh pattern -->
    <pattern id="mesh" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <circle cx="3" cy="3" r="1.8" fill="rgba(80,100,130,0.18)"/>
    </pattern>

    <!-- Grill mesh pattern - smaller for detail -->
    <pattern id="mesh-fine" x="0" y="0" width="4.5" height="4.5" patternUnits="userSpaceOnUse">
      <rect width="4.5" height="4.5" fill="none"/>
      <circle cx="2.25" cy="2.25" r="1.3" fill="rgba(60,80,110,0.22)"/>
    </pattern>

    <!-- Clip path for capsule shape -->
    <clipPath id="capsule-clip">
      <rect x="96" y="52" width="64" height="88" rx="32" ry="32"/>
    </clipPath>

    <!-- Inner shadow for capsule depth -->
    <radialGradient id="capsule-inner-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Subtle inner glow on background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)" opacity="0.5"
        style="filter: drop-shadow(0px -20px 60px rgba(100,140,255,0.15))"/>

  <!-- ═══ MICROPHONE GROUP ═══ -->
  <g filter="url(#shadow)">

    <!-- ─── CAPSULE HEAD ─── -->
    <!-- Outer ring / bezel -->
    <rect x="93" y="49" width="70" height="94" rx="35" ry="35"
          fill="#8890A0" opacity="0.5"/>

    <!-- Main capsule body — metallic silver -->
    <rect x="96" y="52" width="64" height="88" rx="32" ry="32"
          fill="url(#capsule-body)"/>

    <!-- Mesh grill area (slightly inset) -->
    <rect x="100" y="56" width="56" height="80" rx="28" ry="28"
          fill="url(#grill-bg)"/>

    <!-- Mesh dot pattern overlay -->
    <rect x="100" y="56" width="56" height="80" rx="28" ry="28"
          fill="url(#mesh-fine)" clip-path="url(#capsule-clip)"/>

    <!-- Horizontal grill lines for extra texture -->
    <g clip-path="url(#capsule-clip)" stroke="rgba(70,90,120,0.10)" stroke-width="0.8">
      <line x1="100" y1="62" x2="156" y2="62"/>
      <line x1="100" y1="67" x2="156" y2="67"/>
      <line x1="100" y1="72" x2="156" y2="72"/>
      <line x1="100" y1="77" x2="156" y2="77"/>
      <line x1="100" y1="82" x2="156" y2="82"/>
      <line x1="100" y1="87" x2="156" y2="87"/>
      <line x1="100" y1="92" x2="156" y2="92"/>
      <line x1="100" y1="97" x2="156" y2="97"/>
      <line x1="100" y1="102" x2="156" y2="102"/>
      <line x1="100" y1="107" x2="156" y2="107"/>
      <line x1="100" y1="112" x2="156" y2="112"/>
      <line x1="100" y1="117" x2="156" y2="117"/>
      <line x1="100" y1="122" x2="156" y2="122"/>
      <line x1="100" y1="127" x2="156" y2="127"/>
    </g>

    <!-- Capsule specular highlight — bright white streak -->
    <rect x="96" y="52" width="64" height="88" rx="32" ry="32"
          fill="url(#capsule-highlight)" opacity="0.5"/>

    <!-- Top highlight arc -->
    <ellipse cx="128" cy="62" rx="20" ry="8" fill="rgba(255,255,255,0.35)"/>

    <!-- Capsule outline ring -->
    <rect x="96" y="52" width="64" height="88" rx="32" ry="32"
          fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>

    <!-- Inner capsule edge shadow (bottom) -->
    <rect x="96" y="52" width="64" height="88" rx="32" ry="32"
          fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>


    <!-- ─── CRADLE ─── -->
    <!-- Cradle U-shape — metallic arc -->
    <path d="M88,108 C88,158 128,162 128,162 C128,162 168,158 168,108"
          fill="none" stroke="url(#cradle-metal)" stroke-width="7"
          stroke-linecap="round"/>

    <!-- Cradle highlight on left edge -->
    <path d="M88,108 C88,148 108,158 128,162"
          fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"
          stroke-linecap="round"/>

    <!-- Cradle inner shadow -->
    <path d="M88,108 C88,158 128,162 128,162 C128,162 168,158 168,108"
          fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"
          stroke-linecap="round"/>


    <!-- ─── STEM ─── -->
    <!-- Main stem -->
    <rect x="124" y="160" width="8" height="30" rx="2"
          fill="url(#cradle-metal)"/>

    <!-- Stem highlight -->
    <rect x="125" y="160" width="3" height="30" rx="1"
          fill="rgba(255,255,255,0.3)"/>

    <!-- Stem shadow right edge -->
    <rect x="130" y="160" width="1.5" height="30" rx="0.5"
          fill="rgba(0,0,0,0.05)"/>


    <!-- ─── BASE ─── -->
    <!-- Base platform — wider, metallic -->
    <ellipse cx="128" cy="192" rx="24" ry="6"
             fill="url(#base-metal)"/>

    <!-- Base highlight -->
    <ellipse cx="128" cy="190" rx="20" ry="3"
             fill="rgba(255,255,255,0.3)"/>

    <!-- Base shadow beneath -->
    <ellipse cx="128" cy="195" rx="22" ry="4"
             fill="rgba(0,0,0,0.06)"/>

    <!-- Base edge ring -->
    <ellipse cx="128" cy="192" rx="24" ry="6"
             fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

  </g>
</svg>